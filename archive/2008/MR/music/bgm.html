<script language=Javascript>
//시노부 BGM 환경변수 설정
//이곳은 여러분의 환경에 맞게 필히 수정해야 합니다

//기본 재생 모드
//0 -> 일반(순차) 재생모드 (기본값)
//1 -> 랜덤 재생모드
//즉, 처음에 이 페이지를 로딩할때에 랜덤으로 음악이 선택되고
//다음, 이전트랙 버튼을 눌러도 임의의 곡으로 이동합니다
var playMode = 1;

//곡과 곡사이의 쉬는 시간
//윈도우 미디어 콘트롤로 음악을 스트리밍 재생하기 때문에 설정해야 합니다
//빠른 계정이나 고속통신 사용자는 4,5초 정도가,
//외국 계정이나 모뎀 사용자는 7초 정도가 적당합니다
var restLength = 4;


//BGM 제목의 표시여부
//현재 연주되고 있는 bgm의 제목을 <input> 박스에 표시하려면 1을
//상태 표시줄에 표시하려면 2를
//표시하지 않으려면 0을 선택하십시오.
var showTitle = 1;

//BGM Player 초기 로딩시 재생여부
//BGM Player가 처음 로딩되었을 때 부터 음악이 재생되기를 원하시면 1,
//그렇지 않으면 0을 넣으십시오.
var doFirstPlay = 0;

//연주할 곡 목록(즉, 플레이 리스트)를 작성합니다
//addbgm('음악 파일의 전체(물리)경로', '음악 제목', 음악 연주시간(초)); 로 써주시면 됩니다.
//(예) addbgm('http://www.server.com/folder/file.wma','Music',123);
//만약에 음악 제목을 써주시지 않으면 자동으로 'Track 번호' 식으로 됩니다
addbgm('http://143.248.204.39/BGsound/Neil%20Zaza%20-%5bMelodica%5d02%20This%20Time.mp3','Neil Zaza -[Melodica] This Time',341);
addbgm('http://143.248.204.39/BGsound/Neil%20Zaza%20-%5bMelodica%5d03%20All%20My%20Life.mp3','Neil Zaza -[Melodica] All My Life',341);
addbgm('http://143.248.204.39/BGsound/Neil%20Zaza%20-%5bMelodica%5d04%20As%20I%20Go%20Before%20You.mp3','Neil Zaza -[Melodica] As I Go Before You',353);
addbgm('http://143.248.204.39/BGsound/Neil%20Zaza%20-%5bMelodica%5d05%20Melodica.mp3','Neil Zaza -[Melodica] Melodica',322);
addbgm('http://143.248.204.39/BGsound/Neil%20Zaza%20-%5bMelodica%5d06%20Breadstick.mp3	','Neil Zaza -[Melodica] Breadstick',298);
addbgm('http://143.248.204.39/BGsound/Neil%20Zaza%20-%5bMelodica%5d07%20Ship%20Of%20Dreams.mp3','Neil Zaza -[Melodica] Ship of Dreams',387);
addbgm('http://143.248.204.39/BGsound/Neil%20Zaza%20-%5bMelodica%5d08%20The%20Flow.mp3','Neil Zaza -[Melodica] The Flow',285);
addbgm('http://143.248.204.39/BGsound/Neil%20Zaza%20-%5bMelodica%5d09%20I%20Can%20See%20Miracles.mp3','Neil Zaza -[Melodica] I Can See Miracles',402);
addbgm('http://143.248.204.39/BGsound/Neil%20Zaza%20-%5bMelodica%5d10%20Across%20The%20Sands.mp3','Neil Zaza -[Melodica] Across the Sands',354);
addbgm('http://143.248.204.39/BGsound/Neil%20Zaza%20-%5bMelodica%5d11%20Rena.mp3','Neil Zaza -[Melodica] Rena',238);
addbgm('http://143.248.204.39/BGsound/Neil%20Zaza%20-%5bMelodica%5d12%20Very%20Important%20Cat%20Things.mp3','Neil Zaza -[Melodica] Very Important Cat Things',318);
addbgm('http://143.248.204.39/BGsound/Neil%20Zaza%20-%5bMelodica%5d13%20Everything%20About%20You.mp3','Neil Zaza -[Melodica] Everything about You',224);
addbgm('http://143.248.204.39/BGsound/Neil%20Zaza%20-%5bMelodica%5d14%20Forget%20To%20Make%20Her%20Mine.mp3','Neil Zaza -[Melodica] Forgot to Make Her Mine',399);
addbgm('http://143.248.204.39/BGsound/Neil%20Zaza%20-%5bMelodica%5d15%20Goodbye.mp3','Neil Zaza -[Melodica] Goodbye',112);
</script>
