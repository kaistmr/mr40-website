<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MR 40년의 활동 사진과 영상 아카이브" />
  <meta property="og:title" content="사진관 — MR 40" /><meta property="og:description" content="40년의 순간을 사진과 영상으로 만나보세요." />
  <meta property="og:image" content="https://mosw626.github.io/mr40-website/assets/og-image.png" /><meta property="og:url" content="https://mosw626.github.io/mr40-website/gallery.html" />
  <meta property="og:type" content="website" /><meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" href="assets/favicon.png" /><link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <title>사진관 — MR 40</title>
  <!-- Pretendard 폰트 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <!-- 공통 스타일 -->
  <link rel="stylesheet" href="assets/style.css" />
  <!-- 설정 & 공통 스크립트 -->
  <script src="config.js"></script>
  <script src="assets/common.js"></script>
  <script src="assets/ops.js"></script>

  <style>
    /* ── 페이지 헤더 ── */
    .gal-header {
      padding: 3rem 0 1.5rem;
      text-align: center;
    }

    .gal-title {
      font-size: clamp(1.6rem, 5vw, 2.5rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      margin-bottom: 0.6rem;
    }

    .gal-subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.7;
    }

    /* ── 탭 ── */
    .gal-tabs {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
    }

    .gal-tab {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--muted);
      border-radius: 9999px;
      padding: 0.55rem 1.4rem;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
    }

    .gal-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── 연도 필터 칩 ── */
    .year-chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.4rem;
      margin-bottom: 1.5rem;
    }

    .year-chip {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--muted);
      border-radius: 9999px;
      min-height: 44px;
      padding: 0.5rem 0.95rem;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
    }

    .year-chip:hover {
      color: var(--text);
    }

    .year-chip.active {
      background: rgba(91, 140, 255, 0.25);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── 사진 그리드 ── */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.5rem;
      min-height: 60vh;
      padding-bottom: 3rem;
    }

    @media (min-width: 768px) {
      .photo-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 0.75rem;
      }
    }

    .photo-cell {
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 0.6rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      cursor: pointer;
      padding: 0;
    }

    .photo-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.25s;
    }

    .photo-cell:hover img {
      transform: scale(1.05);
    }

    /* ── 라이트박스 ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(4, 8, 20, 0.94);
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 92vw;
      max-height: 82vh;
      border-radius: 0.5rem;
      box-shadow: 0 12px 60px rgba(0, 0, 0, 0.6);
      /* 가장자리 정의용 1px 흰색 윤곽(다크 배경) — img라 box-shadow 대신 outline 사용 */
      outline: 1px solid rgba(255, 255, 255, 0.1);
      outline-offset: -1px;
    }

    .lb-caption {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 1rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .lb-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--text);
      width: 3.25rem;
      height: 3.25rem;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
      z-index: 2001;
    }

    .lb-btn:hover {
      background: rgba(91, 140, 255, 0.35);
    }

    .lb-prev { left: 0.75rem; }
    .lb-next { right: 0.75rem; }

    .lb-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 48px;
      height: 48px;
      background: rgba(11, 21, 48, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      color: var(--text);
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      z-index: 2001;
    }

    .lb-close:hover { color: var(--text); }

    body.lb-lock { overflow: hidden; }

    .photo-sentinel {
      grid-column: 1 / -1;
      min-height: 2px;
    }

    /* ── 영상 목록 ── */
    .video-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
      padding-bottom: 3rem;
    }

    @media (min-width: 768px) {
      .video-list { grid-template-columns: repeat(2, 1fr); }
    }

    .video-card {
      border-radius: var(--radius);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .video-frame {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #000;
      cursor: pointer;
      border: none;
      padding: 0;
      width: 100%;
      display: block;
    }

    .video-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.85;
    }

    .video-frame .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.7);
      transition: transform 0.2s;
    }

    .video-frame:hover .play-overlay {
      transform: scale(1.15);
    }

    .video-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .video-meta {
      padding: 1rem 1.25rem;
    }

    .video-meta h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .video-meta .video-year {
      color: var(--accent);
      font-weight: 700;
      font-size: 0.8rem;
      margin-right: 0.4rem;
    }

    .video-meta p {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── 상태 메시지 ── */
    .gal-status {
      text-align: center;
      color: var(--muted);
      padding: 4rem 1rem;
      line-height: 1.8;
    }

    /* ── 사이트 푸터 ── */
    .site-footer {
      border-top: 1px solid rgba(91, 140, 255, 0.12);
      padding: 2rem 1.25rem;
      text-align: center;
    }

    .site-footer .footer-name {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.02em;
      margin-bottom: 0.4rem;
    }

    .site-footer .footer-note {
      font-size: 0.75rem;
      color: rgba(125, 141, 181, 0.55);
    }
  </style>
</head>
<body>
  <script>injectNav("gallery.html");</script>

  <header class="gal-header container">
    <h1 class="gal-title">사진관 <span class="text-accent">📷</span></h1>
    <p class="gal-subtitle">40년의 순간들 — 역대 활동 사진과 영상 아카이브</p>
  </header>

  <main class="container">
    <div class="gal-tabs" role="tablist">
      <button class="gal-tab active" id="tab-photos" type="button" role="tab" aria-selected="true" aria-controls="panel-photos">📷 사진</button>
      <button class="gal-tab" id="tab-videos" type="button" role="tab" aria-selected="false" aria-controls="panel-videos">🎬 영상</button>
    </div>

    <!-- 사진 탭 -->
    <section id="panel-photos" role="tabpanel" aria-labelledby="tab-photos">
      <div class="year-chips" id="year-chips"></div>
      <div class="photo-grid" id="photo-grid" data-stagger data-stagger-max="6"></div>
    </section>

    <!-- 영상 탭 -->
    <section id="panel-videos" role="tabpanel" aria-labelledby="tab-videos" hidden>
      <div class="video-list" id="video-list"></div>
    </section>
  </main>

  <!-- 라이트박스 -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="사진 크게 보기" aria-hidden="true">
    <button class="lb-close" type="button" aria-label="닫기">×</button>
    <button class="lb-btn lb-prev" type="button" aria-label="이전">←</button>
    <img id="lb-img" alt="" />
    <button class="lb-btn lb-next" type="button" aria-label="다음">→</button>
    <div class="lb-caption" id="lb-caption"></div>
  </div>

  <footer class="site-footer">
    <p class="footer-name">KAIST MR · Microrobot Research · Since 1986</p>
    <p class="footer-note">© 2026 MR 40주년 준비위원회</p>
  </footer>

  <script>
  (function () {
    "use strict";

    var galleryIndex = [];   // 연도별 파일 인덱스
    var photoCache = {};     // 이미 불러온 연도별 목록
    var viewPhotos = [];     // 현재 필터 적용된 목록 (라이트박스 탐색 기준)
    var currentYear = "all"; // "all" | "unknown" | 숫자 문자열
    var lbIndex = 0;
    var renderedCount = 0;
    var batchSize = 200;
    var lastFocused = null;
    var lightboxHistoryOpen = false;

    // ───────────────────── 탭 ─────────────────────
    var tabPhotos = document.getElementById("tab-photos");
    var tabVideos = document.getElementById("tab-videos");
    var panelPhotos = document.getElementById("panel-photos");
    var panelVideos = document.getElementById("panel-videos");

    function setTab(name) {
      var isPhotos = name !== "videos";
      tabPhotos.classList.toggle("active", isPhotos);
      tabVideos.classList.toggle("active", !isPhotos);
      tabPhotos.setAttribute("aria-selected", String(isPhotos));
      tabVideos.setAttribute("aria-selected", String(!isPhotos));
      tabPhotos.tabIndex = isPhotos ? 0 : -1;
      tabVideos.tabIndex = isPhotos ? -1 : 0;
      panelPhotos.hidden = !isPhotos;
      panelVideos.hidden = isPhotos;
      // 해시로 탭 상태 보존 (#photos / #videos)
      if (history.replaceState) {
        history.replaceState(null, "", "#" + (isPhotos ? "photos" : "videos"));
      }
    }

    tabPhotos.addEventListener("click", function () { setTab("photos"); });
    tabVideos.addEventListener("click", function () { setTab("videos"); });
    setTab(location.hash === "#videos" ? "videos" : "photos");

    // ───────────────────── 사진 탭 ─────────────────────
    var chipsEl = document.getElementById("year-chips");
    var gridEl = document.getElementById("photo-grid");

    function yearLabel(y) {
      return y === null || y === undefined ? "연도미상" : String(y);
    }

    function buildChips() {
      var years = galleryIndex.filter(function (item) {
        return item.year !== null && item.year !== undefined;
      }).map(function (item) { return item.year; });
      var hasUnknown = galleryIndex.some(function (item) {
        return item.year === null || item.year === undefined;
      });
      years.sort(function (a, b) { return a - b; });

      var html = '<button class="year-chip' + (currentYear === "all" ? " active" : "") + '" data-year="all" type="button">전체</button>';
      years.forEach(function (y) {
        html += '<button class="year-chip' + (currentYear === String(y) ? " active" : "") + '" data-year="' + y + '" type="button">' + y + "</button>";
      });
      if (hasUnknown) {
        html += '<button class="year-chip' + (currentYear === "unknown" ? " active" : "") + '" data-year="unknown" type="button">연도미상</button>';
      }
      chipsEl.innerHTML = html;
    }

    chipsEl.addEventListener("click", function (e) {
      var btn = e.target.closest(".year-chip");
      if (!btn) return;
      selectYear(btn.getAttribute("data-year"));
    });

    function renderGrid(photos) {
      gridEl.innerHTML = "";
      viewPhotos = photos || [];

      if (viewPhotos.length === 0) {
        gridEl.innerHTML = '<p class="gal-status" style="grid-column:1/-1;">아직 사진이 없습니다.</p>';
        return;
      }
      renderedCount = 0;
      appendBatch();
    }

    function fetchJson(url) {
      return fetch(url).then(function (response) {
        if (!response.ok) throw new Error(response.status);
        return response.json();
      });
    }

    function loadPhotos(year) {
      if (photoCache[year]) return Promise.resolve(photoCache[year]);
      var url = "data/gallery.json";
      if (year !== "all") {
        var entry = galleryIndex.find(function (item) {
          if (year === "unknown") return item.year === null || item.year === undefined;
          return String(item.year) === year;
        });
        if (!entry) return Promise.resolve([]);
        url = entry.file;
      }
      return fetchJson(url).then(function (photos) {
        photoCache[year] = photos;
        return photos;
      });
    }

    function selectYear(year) {
      currentYear = year;
      buildChips();
      gridEl.innerHTML = '<p class="gal-status" style="grid-column:1/-1;">사진을 불러오는 중입니다.</p>';
      loadPhotos(year).then(function (photos) {
        if (currentYear === year) renderGrid(photos);
      }).catch(function () {
        if (currentYear === year) {
          gridEl.innerHTML = '<p class="gal-status" style="grid-column:1/-1;">사진 데이터를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.</p>';
        }
      });
    }

    function appendBatch() {
      if (renderedCount >= viewPhotos.length) return;
      var end = Math.min(renderedCount + batchSize, viewPhotos.length);
      var html = "";
      viewPhotos.slice(renderedCount, end).forEach(function (p, offset) {
        var i = renderedCount + offset;
        // thumb 키는 build_gallery.py가 생성한 md5 파일명 — 영숫자이지만 방어적으로 escape
        var thumb = escapeHtml(p.thumb);
        html += '<button class="photo-cell" data-idx="' + i + '" type="button">' +
          '<img src="thumbs/' + thumb + '"' +
          (i === 0 ? ' loading="eager" fetchpriority="high"' : ' loading="lazy"') +
          ' alt="MR ' + escapeHtml(yearLabel(p.year)) + ' 사진" />' +
          "</button>";
      });
      gridEl.insertAdjacentHTML("beforeend", html);
      renderedCount = end;
      if (renderedCount < viewPhotos.length) {
        gridEl.insertAdjacentHTML("beforeend", '<div class="photo-sentinel" aria-hidden="true"></div>');
        observeSentinel();
      }
    }

    var batchObserver = "IntersectionObserver" in window
      ? new IntersectionObserver(function (entries) {
          if (entries[0].isIntersecting) {
            batchObserver.disconnect();
            var sentinel = gridEl.querySelector(".photo-sentinel");
            if (sentinel) sentinel.remove();
            appendBatch();
          }
        }, { rootMargin: "500px" })
      : null;

    function observeSentinel() {
      var sentinel = gridEl.querySelector(".photo-sentinel");
      if (!sentinel) return;
      if (batchObserver) batchObserver.observe(sentinel);
      else {
        sentinel.remove();
        appendBatch();
      }
    }

    gridEl.addEventListener("click", function (e) {
      var cell = e.target.closest(".photo-cell");
      if (!cell) return;
      openLightbox(parseInt(cell.getAttribute("data-idx"), 10));
    });

    // ───────────────────── 라이트박스 ─────────────────────
    var lbEl = document.getElementById("lightbox");
    var lbImg = document.getElementById("lb-img");
    var lbCaption = document.getElementById("lb-caption");

    // 라이트박스 이미지 소스 우선순위:
    // R2 원본(설정 시) → full/ 폴더(업스케일본을 같은 파일명으로 넣으면 자동 사용) → 썸네일
    function srcChain(p) {
      var key = encodeURIComponent(p.thumb);
      var chain = [];
      if (CONFIG.R2_BASE_URL) {
        chain.push(CONFIG.R2_BASE_URL.replace(/\/$/, "") + "/full/" + key);
      }
      chain.push("full/" + key);
      chain.push("thumbs/" + key);
      return chain;
    }

    function showAt(idx) {
      var n = viewPhotos.length;
      lbIndex = ((idx % n) + n) % n; // 순환 탐색
      var p = viewPhotos[lbIndex];
      var chain = srcChain(p);
      var step = 0;
      lbImg.onerror = function () {
        step += 1;
        if (step < chain.length) {
          lbImg.src = chain[step];
        } else {
          lbImg.onerror = null;
        }
      };
      lbImg.src = chain[0];
      lbImg.alt = "MR " + yearLabel(p.year) + " 사진";
      lbCaption.textContent = yearLabel(p.year) + " · " + (lbIndex + 1) + " / " + n;
    }

    function openLightbox(idx, fromHistory) {
      if (viewPhotos.length === 0) return;
      lastFocused = document.activeElement;
      showAt(idx);
      lbEl.classList.add("open");
      lbEl.setAttribute("aria-hidden", "false");
      document.body.classList.add("lb-lock");
      lbEl.querySelector(".lb-close").focus();
      if (!fromHistory && history.pushState) {
        history.pushState({ mr40Lightbox: true }, "", location.href);
        lightboxHistoryOpen = true;
      }
    }

    function closeLightbox(fromHistory) {
      if (!lbEl.classList.contains("open")) return;
      lbEl.classList.remove("open");
      lbEl.setAttribute("aria-hidden", "true");
      document.body.classList.remove("lb-lock");
      lbImg.src = "";
      if (lastFocused && lastFocused.focus) lastFocused.focus();
      if (!fromHistory && lightboxHistoryOpen) {
        lightboxHistoryOpen = false;
        history.back();
      }
    }

    lbEl.querySelector(".lb-close").addEventListener("click", closeLightbox);
    lbEl.querySelector(".lb-prev").addEventListener("click", function () { showAt(lbIndex - 1); });
    lbEl.querySelector(".lb-next").addEventListener("click", function () { showAt(lbIndex + 1); });
    lbEl.addEventListener("click", function (e) {
      if (e.target === lbEl) closeLightbox(); // 배경 클릭만 닫기
    });

    document.addEventListener("keydown", function (e) {
      if (!lbEl.classList.contains("open")) return;
      if (e.key === "Escape") closeLightbox();
      else if (e.key === "ArrowLeft") showAt(lbIndex - 1);
      else if (e.key === "ArrowRight") showAt(lbIndex + 1);
      else if (e.key === "Tab") {
        var controls = Array.from(lbEl.querySelectorAll("button"));
        var first = controls[0];
        var last = controls[controls.length - 1];
        if (e.shiftKey && document.activeElement === first) {
          e.preventDefault(); last.focus();
        } else if (!e.shiftKey && document.activeElement === last) {
          e.preventDefault(); first.focus();
        }
      }
    });

    window.addEventListener("popstate", function () {
      if (lbEl.classList.contains("open")) {
        lightboxHistoryOpen = false;
        closeLightbox(true);
      }
    });

    // 터치 스와이프
    var touchX = null;
    lbEl.addEventListener("touchstart", function (e) {
      touchX = e.changedTouches[0].clientX;
    }, { passive: true });
    lbEl.addEventListener("touchend", function (e) {
      if (touchX === null) return;
      var dx = e.changedTouches[0].clientX - touchX;
      touchX = null;
      if (Math.abs(dx) < 40) return;
      showAt(dx > 0 ? lbIndex - 1 : lbIndex + 1);
    }, { passive: true });

    // ───────────────────── 영상 탭 ─────────────────────
    var videoListEl = document.getElementById("video-list");

    function renderVideos(videos) {
      videoListEl.innerHTML = "";
      if (!videos || videos.length === 0) {
        videoListEl.innerHTML = '<p class="gal-status" style="grid-column:1/-1;">영상은 디지털로 옮기는 중이에요 🎞️</p>';
        return;
      }
      videos.sort(function (a, b) { return (a.year || 0) - (b.year || 0); });
      var html = "";
      videos.forEach(function (v) {
        var id = encodeURIComponent(String(v.id || ""));
        html += '<div class="video-card">' +
          '<button class="video-frame" data-id="' + id + '" type="button" aria-label="영상 재생">' +
          '<img src="https://i.ytimg.com/vi/' + id + '/hqdefault.jpg" loading="lazy" alt="' + escapeHtml(v.title || "영상") + '" />' +
          '<span class="play-overlay">▶</span>' +
          "</button>" +
          '<div class="video-meta">' +
          "<h3>" + escapeHtml(v.title || "제목 없음") + "</h3>" +
          '<p><span class="video-year">' + escapeHtml(v.year ? String(v.year) : "") + "</span>" +
          escapeHtml(v.desc || "") + "</p>" +
          "</div></div>";
      });
      videoListEl.innerHTML = html;
    }

    // 클릭 시에만 iframe 로드 (초기 로드 성능)
    videoListEl.addEventListener("click", function (e) {
      var frame = e.target.closest(".video-frame");
      if (!frame || frame.querySelector("iframe")) return;
      var id = frame.getAttribute("data-id");
      frame.innerHTML = '<iframe src="https://www.youtube-nocookie.com/embed/' + id +
        '?autoplay=1" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>';
    });

    // ───────────────────── 데이터 로드 ─────────────────────
    fetchJson("data/gallery-years/index.json")
      .then(function (index) {
        galleryIndex = index;
        var knownYears = galleryIndex.map(function (item) { return item.year; }).filter(function (year) {
          return year !== null && year !== undefined;
        });
        if (knownYears.length) currentYear = String(Math.max.apply(null, knownYears));
        buildChips();
        selectYear(currentYear);
      })
      .catch(function () {
        fetchJson("data/gallery.json").then(function (photos) {
          photoCache.all = photos;
          var groups = {};
          photos.forEach(function (photo) {
            var key = photo.year === null || photo.year === undefined ? "unknown" : String(photo.year);
            groups[key] = (groups[key] || 0) + 1;
          });
          galleryIndex = Object.keys(groups).map(function (key) {
            return { year: key === "unknown" ? null : Number(key), count: groups[key] };
          });
          var knownYears = galleryIndex.map(function (item) { return item.year; }).filter(Number.isFinite);
          currentYear = knownYears.length ? String(Math.max.apply(null, knownYears)) : "all";
          photoCache[currentYear] = photos.filter(function (photo) {
            return String(photo.year) === currentYear;
          });
          buildChips();
          selectYear(currentYear);
        }).catch(function () {
          gridEl.innerHTML = '<p class="gal-status" style="grid-column:1/-1;">사진 데이터를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.</p>';
        });
      });

    MR40Ops.rows("videos").then(function (videos) {
      videos = videos.filter(MR40Ops.active);
      if (videos.length) return renderVideos(videos);
      fetch("data/videos.json")
        .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(renderVideos)
        .catch(function () {
          videoListEl.innerHTML = '<p class="gal-status" style="grid-column:1/-1;">영상 데이터를 불러오지 못했습니다.</p>';
        });
    });
  })();
  </script>
</body>
</html>
