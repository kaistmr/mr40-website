<p style="line-height:2; margin-top:10;" align="left">08학번 임재연 ( Zerial48@Gmail.com )</p>
<p style="line-height:2; margin-top:10;" align="left">이번 회지 레이아웃 디자인을 맡은 임재연입니다.</p>
<p style="line-height:2; margin-top:10;" align="left">마침 제 홈페이지를 만들고 있던 참에 회지를 만들어보지 않겠느냐는 권유를 받고 참여하게 되었습니다. 개인 사정 때문에 총회에는 참석하지 못하고 (어쩌면 늦게 참석하여 얼굴을 비추었을 수도 있겠습니다마는) 이렇게 화면상으로나마 인사를 드리게 되네요.</p>
<p style="line-height:2; margin-top:10;" align="left">별 거 아닌 손재주로 만든 페이지입니다만, 2008년 한해, 미스터가 무슨 활동을 했는지 좀 더 편하게 알아보실 수 있었으면 좋겠습니다 :)</p>
