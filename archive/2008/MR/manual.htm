<p>- ESC를 누르시면 미스터 주제곡이 그만 나옵니다.</p>
<p>- 아래에 있는 배경음악 재생기를 이용하시면 다른 음악 몇 가지를 들을 수 있습니다.<br>배경음악 재생을 위해서는 인터넷 연결이 필요합니다.<br>(제 컴퓨터에 직접 연결되어있습니다. 아이피가 바뀔 경우 재생이 안될 수 있습니다.)</p>
<p>- 일부 페이지에서, 플러그인이 작동하지 않으면 내용이 제대로 출력되지 않습니다.<br>브라우저 상단의 안내를 클릭하여 플러그인을 실행해주세요.</p>
