<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사진관 — MR 40</title>
  <!-- Pretendard 폰트 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 공통 스타일 -->
  <link rel="stylesheet" href="assets/style.css" />
  <!-- 설정 & 공통 스크립트 -->
  <script src="config.js"></script>
  <script src="assets/common.js"></script>

  <style>
    /* ── 페이지 헤더 ── */
    .gal-header {
      padding: 3rem 0 1.5rem;
      text-align: center;
    }

    .gal-title {
      font-size: clamp(1.6rem, 5vw, 2.5rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      margin-bottom: 0.6rem;
    }

    .gal-subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.7;
    }

    /* ── 탭 ── */
    .gal-tabs {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
    }

    .gal-tab {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--muted);
      border-radius: 9999px;
      padding: 0.55rem 1.4rem;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
    }

    .gal-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── 연도 필터 칩 ── */
    .year-chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.4rem;
      margin-bottom: 1.5rem;
    }

    .year-chip {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--muted);
      border-radius: 9999px;
      padding: 0.3rem 0.85rem;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
    }

    .year-chip:hover {
      color: var(--text);
    }

    .year-chip.active {
      background: rgba(91, 140, 255, 0.25);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── 사진 그리드 ── */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.5rem;
      padding-bottom: 3rem;
    }

    @media (min-width: 768px) {
      .photo-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 0.75rem;
      }
    }

    .photo-cell {
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 0.6rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      cursor: pointer;
      padding: 0;
    }

    .photo-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.25s;
    }

    .photo-cell:hover img {
      transform: scale(1.05);
    }

    /* ── 라이트박스 ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(4, 8, 20, 0.94);
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 92vw;
      max-height: 82vh;
      border-radius: 0.5rem;
      box-shadow: 0 12px 60px rgba(0, 0, 0, 0.6);
    }

    .lb-caption {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 0.875rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .lb-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--text);
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
      z-index: 2001;
    }

    .lb-btn:hover {
      background: rgba(91, 140, 255, 0.35);
    }

    .lb-prev { left: 0.75rem; }
    .lb-next { right: 0.75rem; }

    .lb-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.8rem;
      cursor: pointer;
      z-index: 2001;
      line-height: 1;
      padding: 0.4rem;
    }

    .lb-close:hover { color: var(--text); }

    body.lb-lock { overflow: hidden; }

    /* ── 영상 목록 ── */
    .video-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
      padding-bottom: 3rem;
    }

    @media (min-width: 768px) {
      .video-list { grid-template-columns: repeat(2, 1fr); }
    }

    .video-card {
      border-radius: var(--radius);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .video-frame {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #000;
      cursor: pointer;
      border: none;
      padding: 0;
      width: 100%;
      display: block;
    }

    .video-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.85;
    }

    .video-frame .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.7);
      transition: transform 0.2s;
    }

    .video-frame:hover .play-overlay {
      transform: scale(1.15);
    }

    .video-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .video-meta {
      padding: 1rem 1.25rem;
    }

    .video-meta h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .video-meta .video-year {
      color: var(--accent);
      font-weight: 700;
      font-size: 0.8rem;
      margin-right: 0.4rem;
    }

    .video-meta p {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── 상태 메시지 ── */
    .gal-status {
      text-align: center;
      color: var(--muted);
      padding: 4rem 1rem;
      line-height: 1.8;
    }

    /* ── 사이트 푸터 ── */
    .site-footer {
      border-top: 1px solid rgba(91, 140, 255, 0.12);
      padding: 2rem 1.25rem;
      text-align: center;
    }

    .site-footer .footer-name {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.02em;
      margin-bottom: 0.4rem;
    }

    .site-footer .footer-note {
      font-size: 0.75rem;
      color: rgba(125, 141, 181, 0.55);
    }
  </style>
</head>
<body>
  <script>injectNav("gallery.html");</script>

  <header class="gal-header container">
    <h1 class="gal-title">사진관 <span class="text-accent">📷</span></h1>
    <p class="gal-subtitle">40년의 순간들 — 역대 활동 사진과 영상 아카이브</p>
  </header>

  <div class="container">
    <div class="gal-tabs" role="tablist">
      <button class="gal-tab active" id="tab-photos" type="button">📷 사진</button>
      <button class="gal-tab" id="tab-videos" type="button">🎬 영상</button>
    </div>

    <!-- 사진 탭 -->
    <section id="panel-photos">
      <div class="year-chips" id="year-chips"></div>
      <div class="photo-grid" id="photo-grid"></div>
    </section>

    <!-- 영상 탭 -->
    <section id="panel-videos" hidden>
      <div class="video-list" id="video-list"></div>
    </section>
  </div>

  <!-- 라이트박스 -->
  <div class="lightbox" id="lightbox">
    <button class="lb-close" type="button" aria-label="닫기">×</button>
    <button class="lb-btn lb-prev" type="button" aria-label="이전">←</button>
    <img id="lb-img" alt="" />
    <button class="lb-btn lb-next" type="button" aria-label="다음">→</button>
    <div class="lb-caption" id="lb-caption"></div>
  </div>

  <footer class="site-footer">
    <p class="footer-name">KAIST 마이크로 로봇 동아리 MR · Since 1986</p>
    <p class="footer-note">© 2026 MR 40주년 준비위원회</p>
  </footer>

  <script>
  (function () {
    "use strict";

    var allPhotos = [];      // gallery.json 전체
    var viewPhotos = [];     // 현재 필터 적용된 목록 (라이트박스 탐색 기준)
    var currentYear = "all"; // "all" | "unknown" | 숫자 문자열
    var lbIndex = 0;

    // ───────────────────── 탭 ─────────────────────
    var tabPhotos = document.getElementById("tab-photos");
    var tabVideos = document.getElementById("tab-videos");
    var panelPhotos = document.getElementById("panel-photos");
    var panelVideos = document.getElementById("panel-videos");

    function setTab(name) {
      var isPhotos = name !== "videos";
      tabPhotos.classList.toggle("active", isPhotos);
      tabVideos.classList.toggle("active", !isPhotos);
      panelPhotos.hidden = !isPhotos;
      panelVideos.hidden = isPhotos;
      // 해시로 탭 상태 보존 (#photos / #videos)
      if (history.replaceState) {
        history.replaceState(null, "", "#" + (isPhotos ? "photos" : "videos"));
      }
    }

    tabPhotos.addEventListener("click", function () { setTab("photos"); });
    tabVideos.addEventListener("click", function () { setTab("videos"); });
    setTab(location.hash === "#videos" ? "videos" : "photos");

    // ───────────────────── 사진 탭 ─────────────────────
    var chipsEl = document.getElementById("year-chips");
    var gridEl = document.getElementById("photo-grid");

    function yearLabel(y) {
      return y === null || y === undefined ? "연도미상" : String(y);
    }

    function buildChips() {
      var years = [];
      var hasUnknown = false;
      allPhotos.forEach(function (p) {
        if (p.year === null || p.year === undefined) { hasUnknown = true; return; }
        if (years.indexOf(p.year) === -1) years.push(p.year);
      });
      years.sort(function (a, b) { return a - b; });

      var html = '<button class="year-chip' + (currentYear === "all" ? " active" : "") + '" data-year="all" type="button">전체</button>';
      years.forEach(function (y) {
        html += '<button class="year-chip' + (currentYear === String(y) ? " active" : "") + '" data-year="' + y + '" type="button">' + y + "</button>";
      });
      if (hasUnknown) {
        html += '<button class="year-chip' + (currentYear === "unknown" ? " active" : "") + '" data-year="unknown" type="button">연도미상</button>';
      }
      chipsEl.innerHTML = html;
    }

    chipsEl.addEventListener("click", function (e) {
      var btn = e.target.closest(".year-chip");
      if (!btn) return;
      currentYear = btn.getAttribute("data-year");
      buildChips();
      renderGrid();
    });

    function renderGrid() {
      gridEl.innerHTML = "";
      viewPhotos = allPhotos.filter(function (p) {
        if (currentYear === "all") return true;
        if (currentYear === "unknown") return p.year === null || p.year === undefined;
        return String(p.year) === currentYear;
      });

      if (viewPhotos.length === 0) {
        gridEl.innerHTML = '<p class="gal-status" style="grid-column:1/-1;">아직 사진이 없습니다.</p>';
        return;
      }

      var html = "";
      viewPhotos.forEach(function (p, i) {
        // thumb 키는 build_gallery.py가 생성한 md5 파일명 — 영숫자이지만 방어적으로 escape
        var thumb = escapeHtml(p.thumb);
        html += '<button class="photo-cell" data-idx="' + i + '" type="button">' +
          '<img src="thumbs/' + thumb + '" loading="lazy" alt="MR ' + escapeHtml(yearLabel(p.year)) + ' 사진" />' +
          "</button>";
      });
      gridEl.innerHTML = html;
    }

    gridEl.addEventListener("click", function (e) {
      var cell = e.target.closest(".photo-cell");
      if (!cell) return;
      openLightbox(parseInt(cell.getAttribute("data-idx"), 10));
    });

    // ───────────────────── 라이트박스 ─────────────────────
    var lbEl = document.getElementById("lightbox");
    var lbImg = document.getElementById("lb-img");
    var lbCaption = document.getElementById("lb-caption");

    function fullSrc(p) {
      // R2가 연결되면 원본급, 아니면 썸네일로 표시
      if (CONFIG.R2_BASE_URL) {
        return CONFIG.R2_BASE_URL.replace(/\/$/, "") + "/full/" + encodeURIComponent(p.thumb);
      }
      return "thumbs/" + encodeURIComponent(p.thumb);
    }

    function showAt(idx) {
      var n = viewPhotos.length;
      lbIndex = ((idx % n) + n) % n; // 순환 탐색
      var p = viewPhotos[lbIndex];
      lbImg.src = fullSrc(p);
      lbImg.alt = "MR " + yearLabel(p.year) + " 사진";
      // R2 원본 로드 실패 시 로컬 썸네일로 폴백
      lbImg.onerror = function () {
        lbImg.onerror = null;
        lbImg.src = "thumbs/" + encodeURIComponent(p.thumb);
      };
      lbCaption.textContent = yearLabel(p.year) + " · " + (lbIndex + 1) + " / " + n;
    }

    function openLightbox(idx) {
      if (viewPhotos.length === 0) return;
      showAt(idx);
      lbEl.classList.add("open");
      document.body.classList.add("lb-lock");
    }

    function closeLightbox() {
      lbEl.classList.remove("open");
      document.body.classList.remove("lb-lock");
      lbImg.src = "";
    }

    lbEl.querySelector(".lb-close").addEventListener("click", closeLightbox);
    lbEl.querySelector(".lb-prev").addEventListener("click", function () { showAt(lbIndex - 1); });
    lbEl.querySelector(".lb-next").addEventListener("click", function () { showAt(lbIndex + 1); });
    lbEl.addEventListener("click", function (e) {
      if (e.target === lbEl) closeLightbox(); // 배경 클릭만 닫기
    });

    document.addEventListener("keydown", function (e) {
      if (!lbEl.classList.contains("open")) return;
      if (e.key === "Escape") closeLightbox();
      else if (e.key === "ArrowLeft") showAt(lbIndex - 1);
      else if (e.key === "ArrowRight") showAt(lbIndex + 1);
    });

    // 터치 스와이프
    var touchX = null;
    lbEl.addEventListener("touchstart", function (e) {
      touchX = e.changedTouches[0].clientX;
    }, { passive: true });
    lbEl.addEventListener("touchend", function (e) {
      if (touchX === null) return;
      var dx = e.changedTouches[0].clientX - touchX;
      touchX = null;
      if (Math.abs(dx) < 40) return;
      showAt(dx > 0 ? lbIndex - 1 : lbIndex + 1);
    }, { passive: true });

    // ───────────────────── 영상 탭 ─────────────────────
    var videoListEl = document.getElementById("video-list");

    function renderVideos(videos) {
      videoListEl.innerHTML = "";
      if (!videos || videos.length === 0) {
        videoListEl.innerHTML = '<p class="gal-status" style="grid-column:1/-1;">영상은 디지털로 옮기는 중이에요 🎞️</p>';
        return;
      }
      videos.sort(function (a, b) { return (a.year || 0) - (b.year || 0); });
      var html = "";
      videos.forEach(function (v) {
        var id = encodeURIComponent(String(v.id || ""));
        html += '<div class="video-card">' +
          '<button class="video-frame" data-id="' + id + '" type="button" aria-label="영상 재생">' +
          '<img src="https://i.ytimg.com/vi/' + id + '/hqdefault.jpg" loading="lazy" alt="' + escapeHtml(v.title || "영상") + '" />' +
          '<span class="play-overlay">▶</span>' +
          "</button>" +
          '<div class="video-meta">' +
          "<h3>" + escapeHtml(v.title || "제목 없음") + "</h3>" +
          '<p><span class="video-year">' + escapeHtml(v.year ? String(v.year) : "") + "</span>" +
          escapeHtml(v.desc || "") + "</p>" +
          "</div></div>";
      });
      videoListEl.innerHTML = html;
    }

    // 클릭 시에만 iframe 로드 (초기 로드 성능)
    videoListEl.addEventListener("click", function (e) {
      var frame = e.target.closest(".video-frame");
      if (!frame || frame.querySelector("iframe")) return;
      var id = frame.getAttribute("data-id");
      frame.innerHTML = '<iframe src="https://www.youtube-nocookie.com/embed/' + id +
        '?autoplay=1" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>';
    });

    // ───────────────────── 데이터 로드 ─────────────────────
    fetch("data/gallery.json")
      .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(function (json) {
        allPhotos = json;
        buildChips();
        renderGrid();
      })
      .catch(function () {
        gridEl.innerHTML = '<p class="gal-status" style="grid-column:1/-1;">사진 데이터를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.</p>';
      });

    fetch("data/videos.json")
      .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(renderVideos)
      .catch(function () {
        videoListEl.innerHTML = '<p class="gal-status" style="grid-column:1/-1;">영상 데이터를 불러오지 못했습니다.</p>';
      });
  })();
  </script>
</body>
</html>
