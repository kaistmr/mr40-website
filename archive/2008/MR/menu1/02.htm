<p class=MsoNormal style="line-height:2; margin-top:10;" align="left"><span lang=EN-US>08</span>학번 이종훈</p>

<p class=MsoNormal style="line-height:2; margin-top:10;" align="left">주제<span lang=EN-US> : </span>엠티</p>


<p class=MsoNormal style="line-height:2; margin-top:10;" align="left">나름 첫 시작을 잘해보자는 취지로 갔었던 봄학기 첫 엠티<span lang=EN-US>… </span></p>

<p class=MsoNormal style="line-height:2; margin-top:10;" align="left">전 그것이 제가 동방에 들어갈 때 망설여 지는 요소로 자라 날 것이라고 추호도 예상하지 못했습니다<span
lang=EN-US>… </span>제가 첫 엠티 때 야자타임이 지난 후 무슨 짓을 했냐하면<span lang=EN-US>… (</span>아
참<span lang=EN-US>! </span>난 기억이 없지<span lang=EN-US>…) </span>흠<span
lang=EN-US>… </span>그 뒤로 재밌었다<span lang=EN-US>, </span>힘들었다<span lang=EN-US>, </span>뭐
그냥 장난이 아니었다는 이야기만 무성히 들어왔습니다<span lang=EN-US>… </span></p>

<p class=MsoNormal style="line-height:2; margin-top:10;" align="left">내년이면 또 있을 엠티<span lang=EN-US>… </span>그 엠티가 두려워집니다 ㅠㅠ 내년 동아리
안에서 목표는 그냥 모든 걸 잊고 동방에나 열심히<span lang=EN-US>… </span></p>
