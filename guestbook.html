<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>방명록 — MR 40</title>
  <!-- Pretendard 폰트 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 공통 스타일 -->
  <link rel="stylesheet" href="assets/style.css" />
  <!-- 설정 & 공통 스크립트 -->
  <script src="config.js"></script>
  <script src="assets/common.js"></script>

  <style>
    /* ── 페이지 헤더 ── */
    .gb-header {
      padding: 3rem 0 2rem;
      text-align: center;
    }

    .gb-title {
      font-size: clamp(1.6rem, 5vw, 2.5rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--text);
      margin-bottom: 0.6rem;
    }

    .gb-subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 1.75rem;
    }

    /* ── 작성 버튼 ── */
    .gb-write-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 9999px;
      padding: 0.8rem 1.75rem;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 6px 24px rgba(91, 140, 255, 0.35);
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    .gb-write-btn:hover {
      opacity: 0.9;
      transform: scale(1.04);
      box-shadow: 0 10px 32px rgba(91, 140, 255, 0.45);
    }

    .gb-write-btn:active {
      transform: scale(0.97);
    }

    /* ── 메시지 컨테이너 (masonry via CSS columns) ── */
    .gb-masonry {
      columns: 1;
      column-gap: 1rem;
      padding-bottom: 5rem;
    }

    @media (min-width: 700px) {
      .gb-masonry { columns: 2; }
    }

    @media (min-width: 1000px) {
      .gb-masonry { columns: 3; }
    }

    /* ── 메시지 카드 ── */
    .gb-card {
      break-inside: avoid;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius);
      padding: 1.4rem 1.25rem 1rem;
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s, border-color 0.2s;
    }

    .gb-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(91, 140, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(91, 140, 255, 0.25);
    }

    /* 메시지 본문 — 큰 인용 텍스트 */
    .gb-message {
      font-size: 1rem;
      font-weight: 500;
      line-height: 1.75;
      color: var(--text);
      position: relative;
      padding-left: 1.4rem;
    }

    .gb-message::before {
      content: "\201C"; /* " */
      position: absolute;
      left: 0;
      top: -0.15rem;
      font-size: 1.8rem;
      font-weight: 900;
      line-height: 1;
      color: var(--accent);
      opacity: 0.7;
    }

    /* 카드 하단 메타 (이름 + 기수 + 날짜) */
    .gb-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      padding-top: 0.65rem;
    }

    .gb-author {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .gb-cohort-badge {
      background: rgba(91, 140, 255, 0.18);
      color: var(--accent);
      border: 1px solid rgba(91, 140, 255, 0.3);
      border-radius: 9999px;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.12rem 0.5rem;
      white-space: nowrap;
    }

    .gb-date {
      font-size: 0.75rem;
      color: var(--muted);
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── 빈 상태 / 에러 상태 ── */
    .state-notice {
      text-align: center;
      padding: 5rem 1rem;
      color: var(--muted);
    }

    .state-notice .state-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .state-notice p {
      font-size: 0.95rem;
      line-height: 1.8;
    }

    .state-notice .hint {
      font-size: 0.78rem;
      margin-top: 0.5rem;
      opacity: 0.65;
    }

    /* ── FAB (모바일에서 스크롤 내려도 버튼 접근 가능) ── */
    #fab-guestbook {
      display: none;
      position: fixed;
      bottom: 1.75rem;
      right: 1.75rem;
      z-index: 200;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 9999px;
      padding: 0.8rem 1.4rem;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(91, 140, 255, 0.4);
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    #fab-guestbook:hover {
      opacity: 0.9;
      transform: scale(1.04);
      box-shadow: 0 10px 32px rgba(91, 140, 255, 0.5);
    }

    #fab-guestbook:active { transform: scale(0.97); }
    #fab-guestbook.visible { display: flex; }

    /* ── 메시지 카운트 ── */
    .gb-count {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
      margin-top: 0.25rem;
    }

    /* ── 사이트 푸터 ── */
    .site-footer {
      border-top: 1px solid rgba(91, 140, 255, 0.12);
      padding: 2rem 1.25rem;
      text-align: center;
    }

    .site-footer .footer-name {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.02em;
      margin-bottom: 0.4rem;
    }

    .site-footer .footer-note {
      font-size: 0.75rem;
      color: rgba(125, 141, 181, 0.55);
    }
  </style>
</head>
<body>
  <script>injectNav("guestbook.html");</script>

  <!-- ══ 페이지 헤더 ══ -->
  <div class="container">
    <header class="gb-header">
      <h1 class="gb-title">축하 방명록</h1>
      <p class="gb-subtitle">40주년을 축하하는 동문들의 한마디</p>
      <button class="gb-write-btn" id="write-btn" aria-label="축하 한마디 남기기">
        ✍️ 축하 한마디 남기기
      </button>
    </header>

    <!-- 메시지 수 -->
    <p class="gb-count" id="gb-count"></p>

    <!-- ══ 방명록 카드 목록 ══ -->
    <div class="gb-masonry" id="gb-masonry">
      <div class="state-notice">
        <div class="state-icon" aria-hidden="true">💬</div>
        <p>불러오는 중…</p>
      </div>
    </div>
  </div>

  <!-- ══ 사이트 푸터 ══ -->
  <footer class="site-footer">
    <p class="footer-name">KAIST 마이크로 로봇 동아리 MR · Since 1986</p>
    <p class="footer-note">© 2026 MR 40주년 준비위원회</p>
  </footer>

  <!-- ══ FAB — 하단 고정 작성 버튼 ══ -->
  <button id="fab-guestbook" aria-label="축하 한마디 남기기">
    <span aria-hidden="true">✍️</span>한마디 남기기
  </button>

  <!-- ══ 토스트 ══ -->
  <div id="toast"></div>

  <!-- ══ 페이지 스크립트 ══ -->
  <script>
  (function () {
    "use strict";

    // ── 열 인덱스 (Google Form 응답 시트 순서) ──
    var COL_TIMESTAMP = 0;
    var COL_NAME      = 1;
    var COL_COHORT    = 2;
    var COL_MESSAGE   = 3;

    // ── 타임스탬프 → "YYYY.MM.DD" 파싱 ──
    // Google Forms가 내보내는 형식은 로케일마다 다름:
    //   한국어 시트: "2026. 6. 10 오후 2:30:15"
    //   영어 시트:  "6/10/2026 14:30:15"
    // 방어적으로 파싱하고, 모두 실패하면 원본 앞 10자를 잘라 반환.
    function parseTimestamp(raw) {
      if (!raw) return "";
      raw = raw.trim();

      // 1) "YYYY. M. D …" 형식 (한국어 로케일)
      var m = raw.match(/^(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})/);
      if (m) {
        return m[1] + "." + pad2(m[2]) + "." + pad2(m[3]);
      }

      // 2) "M/D/YYYY …" 형식 (영어 로케일)
      m = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if (m) {
        return m[3] + "." + pad2(m[1]) + "." + pad2(m[2]);
      }

      // 3) "YYYY-MM-DD …" ISO 형식 (혹시 몰라)
      m = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) {
        return m[1] + "." + m[2] + "." + m[3];
      }

      // 4) 폴백: 앞 10자 그대로
      return raw.length > 10 ? raw.substring(0, 10) : raw;
    }

    function pad2(n) {
      return String(parseInt(n, 10)).padStart(2, "0");
    }

    // ── 렌더 함수 (캐시+갱신으로 두 번 호출될 수 있으므로 항상 초기화) ──
    function render(rows) {
      var container = document.getElementById("gb-masonry");
      var countEl   = document.getElementById("gb-count");

      // 컨테이너 항상 초기화 (이중 호출 대응)
      container.innerHTML = "";

      if (!rows || rows.length === 0) {
        container.innerHTML =
          '<div class="state-notice">' +
          '<div class="state-icon" aria-hidden="true">💬</div>' +
          '<p>아직 메시지가 없습니다. 첫 한마디를 남겨주세요!</p>' +
          '</div>';
        countEl.textContent = "";
        return;
      }

      // Google Form은 위에서부터 추가 → 최신 메시지가 마지막 행
      // newest-first: 역순으로 렌더
      var reversed = rows.slice().reverse();

      var html = reversed.map(function (r) {
        return buildCard(r);
      }).join("");
      container.innerHTML = html;

      countEl.textContent = "총 " + rows.length + "개의 축하 메시지";
    }

    // ── 단일 카드 HTML ──
    function buildCard(r) {
      var timestamp = escapeHtml(r[COL_TIMESTAMP] || "");
      var name      = escapeHtml((r[COL_NAME]    || "").trim() || "익명");
      var cohort    = escapeHtml((r[COL_COHORT]  || "").trim());
      var message   = escapeHtml((r[COL_MESSAGE] || "").trim());

      if (!message) return ""; // 메시지 없는 행은 스킵

      // 날짜 파싱은 raw 값에서 수행 (escapeHtml 이전 값 사용)
      var dateStr = escapeHtml(parseTimestamp(r[COL_TIMESTAMP] || ""));

      // 기수 배지
      var cohortHtml = cohort
        ? '<span class="gb-cohort-badge">' + cohort + '</span>'
        : "";

      // 날짜
      var dateHtml = dateStr
        ? '<span class="gb-date">' + dateStr + '</span>'
        : "";

      return (
        '<div class="gb-card">' +
          '<p class="gb-message">' + message + '</p>' +
          '<div class="gb-meta">' +
            '<span class="gb-author">' + name + '</span>' +
            cohortHtml +
            dateHtml +
          '</div>' +
        '</div>'
      );
    }

    // ── onFail 핸들러 ──
    function onFail(reason) {
      var container = document.getElementById("gb-masonry");
      var countEl   = document.getElementById("gb-count");
      countEl.textContent = "";

      if (reason === "not-configured") {
        container.innerHTML =
          '<div class="state-notice">' +
          '<div class="state-icon" aria-hidden="true">📋</div>' +
          '<p>방명록이 아직 연결되지 않았습니다.<br>첫 번째 메시지의 주인공이 되어주세요!</p>' +
          '<p class="hint">운영자: config.js 설정 필요</p>' +
          '</div>';
      } else {
        // fetch-error
        container.innerHTML =
          '<div class="state-notice">' +
          '<div class="state-icon" aria-hidden="true">⚠️</div>' +
          '<p>메시지를 불러오지 못했습니다.<br>잠시 후 페이지를 새로고침하면 다시 볼 수 있습니다.</p>' +
          '</div>';
      }
    }

    // ── 시트 로드 ──
    loadSheet(
      CONFIG.GUESTBOOK_CSV_URL,
      "mr40_guestbook",
      render,
      onFail
    );

    // ── 작성 버튼 동작 ──
    function openForm() {
      if (!CONFIG.GUESTBOOK_FORM_URL) {
        showToast("방명록 작성 폼이 아직 연결되지 않았습니다.");
        return;
      }
      window.open(CONFIG.GUESTBOOK_FORM_URL, "_blank", "noopener,noreferrer");
    }

    document.getElementById("write-btn").addEventListener("click", openForm);
    document.getElementById("fab-guestbook").addEventListener("click", openForm);

    // FAB는 항상 표시 (방명록 폼 URL 유무에 상관없이 기능 존재 안내)
    document.getElementById("fab-guestbook").classList.add("visible");

  })();
  </script>
</body>
</html>
