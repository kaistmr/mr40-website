<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MR 40주년 행사 당일 안내" /><title>행사 당일 안내 — MR 40</title>
  <meta property="og:title" content="행사 당일 안내 — MR 40" /><meta property="og:description" content="식순, 오시는 길, 주차와 비상 연락처를 확인하세요." />
  <meta property="og:image" content="https://mosw626.github.io/mr40-website/assets/og-image.png" /><meta property="og:url" content="https://mosw626.github.io/mr40-website/day.html" />
  <meta property="og:type" content="website" /><meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" href="assets/favicon.png" /><link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="assets/style.css" />
  <script src="config.js"></script><script src="assets/common.js"></script><script src="assets/ops.js"></script>
  <style>
    .day-main { max-width: 900px; margin: auto; padding: 3rem 1.25rem 5rem; }
    .day-head { text-align:center; margin-bottom:2rem; } .day-head h1 { font-size:clamp(1.8rem,6vw,3rem); }
    .day-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:1rem; }
    .day-card h2 { color:var(--accent); font-size:1.15rem; margin-bottom:.7rem; }
    .day-card p { color:var(--muted); line-height:1.8; white-space:pre-line; }
    .day-program { list-style:none; display:grid; gap:.7rem; }
    .day-program li { display:grid; grid-template-columns:4.5rem 1fr; gap:.7rem; line-height:1.6; }
    .day-program time { color:var(--accent); font-weight:800; }
    .day-program small { display:block; color:var(--muted); font-size:.875rem; }
    .day-links { display:flex; flex-wrap:wrap; gap:.5rem; margin-top:1rem; }
    .day-links a { min-height:44px; padding:.7rem 1rem; border:1px solid var(--accent); border-radius:9999px; color:var(--accent); font-weight:700; }
  </style>
</head>
<body>
  <script>injectNav("event.html");</script>
  <main class="day-main">
    <header class="day-head"><h1>행사 당일 안내</h1><p class="text-muted">현장에서 필요한 정보를 한곳에 모았습니다.</p></header>
    <div class="day-grid" id="day-grid"></div>
  </main>
  <footer class="site-footer"><p class="footer-name">KAIST MR · Microrobot Research · Since 1986</p><p class="footer-note">© 2026 MR 40주년 준비위원회</p></footer>
  <script>
  MR40Ops.rows("event").then(function (rows) {
    var data = MR40Ops.eventMap(rows);
    var program = MR40Ops.program(data.program || CONFIG.EVENT_DETAILS.program);
    var programHtml = program.length
      ? '<ul class="day-program">' + program.map(function (item) {
          return '<li><time>' + escapeHtml(item.time) + '</time><span>' + escapeHtml(item.what) +
            (item.note ? '<small>' + escapeHtml(item.note) + '</small>' : '') + '</span></li>';
        }).join("") + '</ul>'
      : '<p>준비 중</p>';
    var cards = [
      ["오시는 길", data.address || CONFIG.EVENT_DETAILS.address],
      ["주차", data.parking || CONFIG.EVENT_DETAILS.parking],
      ["좌석 안내", data.seating || CONFIG.EVENT_DETAILS.seating],
      ["비상 연락처", data.emergency || CONFIG.EVENT_DETAILS.emergency || CONFIG.CONTACT.phone],
    ];
    document.getElementById("day-grid").innerHTML =
      '<section class="day-card card"><h2>식순</h2>' + programHtml + '</section>' +
      cards.map(function (card) {
      return '<section class="day-card card"><h2>' + card[0] + '</h2><p>' + escapeHtml(card[1] || "준비 중") + '</p></section>';
    }).join("") + '<section class="day-card card"><h2>지도 앱</h2><p>지도 앱으로 행사장(롯데시티호텔 대전)까지 바로 길을 찾을 수 있습니다.</p><div class="day-links">' +
      (safeUrl(data.kakao_map || CONFIG.MAP_LINKS.kakao) ? '<a href="' + safeUrl(data.kakao_map || CONFIG.MAP_LINKS.kakao) + '" target="_blank" rel="noopener">카카오맵</a>' : '<span>카카오맵 준비 중</span>') +
      (safeUrl(data.naver_map || CONFIG.MAP_LINKS.naver) ? '<a href="' + safeUrl(data.naver_map || CONFIG.MAP_LINKS.naver) + '" target="_blank" rel="noopener">네이버지도</a>' : '<span>네이버지도 준비 중</span>') +
      '</div></section>';
    enhanceCommonContent();
  });
  </script>
</body>
</html>
