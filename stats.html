<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="숫자로 보는 KAIST MR(Microrobot Research)의 40년" />
  <meta property="og:title" content="숫자로 보는 MR — MR 40" /><meta property="og:description" content="사진, 회지, 연혁과 공개 가능한 동문 통계를 살펴봅니다." />
  <meta property="og:image" content="https://kaistmr.github.io/mr40-website/assets/og-image.png" /><meta property="og:url" content="https://kaistmr.github.io/mr40-website/stats.html" />
  <meta property="og:type" content="website" /><meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" href="assets/favicon.png" /><link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <title>숫자로 보는 MR — MR 40</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="assets/style.css" />
  <script src="config.js"></script><script src="assets/common.js"></script><script src="assets/ops.js"></script>
  <style>
    .stats-main { max-width: 1050px; margin: 0 auto; padding: 3rem 1.25rem 5rem; }
    .stats-head { text-align: center; margin-bottom: 2rem; }
    .stats-head h1 { font-size: clamp(1.8rem, 6vw, 3rem); margin-bottom: .6rem; }
    .stats-head p { color: var(--muted); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 1rem; margin-bottom: 3rem; }
    .stat-card { text-align: center; }
    .stat-value { display: block; color: var(--accent); font-size: 2.2rem; font-weight: 900; font-variant-numeric: tabular-nums; }
    .stat-label { color: var(--muted); line-height: 1.5; }
    .group { margin-top: 2.5rem; }
    .group h2 { margin-bottom: 1rem; }
    .bar-row { display: grid; grid-template-columns: minmax(90px, 1fr) 3fr auto; gap: .75rem; align-items: center; margin: .8rem 0; }
    .bar-row strong { font-variant-numeric: tabular-nums; }
    .bar-track { height: 18px; background: rgba(255,255,255,.08); border-radius: 9999px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--accent); border-radius: inherit; }
    .pending { color: var(--muted); text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <script>injectNav("stats.html");</script>
  <main class="stats-main">
    <header class="stats-head"><h1>숫자로 보는 <span class="text-accent">MR</span></h1><p>공개 가능한 집계 수치만 표시합니다.</p></header>
    <section class="stats-grid" id="site-stats" aria-label="사이트 보유 자료" data-stagger></section>
    <div id="people-stats"><p class="pending card">동문 통계를 준비하고 있습니다.</p></div>
  </main>
  <footer class="site-footer"><p class="footer-name">KAIST MR · Microrobot Research · Since 1986</p><p class="footer-note">© 2026 MR 40주년 준비위원회</p></footer>
  <script>
  (function () {
    Promise.all(["gallery", "videos", "magazines", "timeline"].map(function (name) {
      return fetch("data/" + name + ".json").then(function (r) { return r.ok ? r.json() : []; }).catch(function () { return []; });
    })).then(function (sets) {
      var labels = ["사진", "영상", "회지", "연혁"];
      document.getElementById("site-stats").innerHTML = sets.map(function (set, i) {
        return '<div class="stat-card card"><span class="stat-value">' + set.length.toLocaleString("ko-KR") +
          '</span><span class="stat-label">보유 ' + labels[i] + '</span></div>';
      }).join("");
    });
    MR40Ops.rows("stats").then(function (rows) {
      rows = rows.filter(function (r) { return MR40Ops.active({ active: r.public }); })
        .sort(function (a,b) { return MR40Ops.number(a.sort, 0) - MR40Ops.number(b.sort, 0); });
      if (!rows.length) return;
      var groups = {};
      rows.forEach(function (r) {
        var key = r.group || "MR 통계";
        if (!groups[key]) groups[key] = [];
        groups[key].push(r);
      });
      document.getElementById("people-stats").innerHTML = Object.keys(groups).map(function (name) {
        var max = Math.max.apply(null, groups[name].map(function (r) { return MR40Ops.number(r.value, 0); }).concat([1]));
        return '<section class="group"><h2>' + escapeHtml(name) + '</h2><div class="card">' +
          groups[name].map(function (r) {
            var value = MR40Ops.number(r.value, 0);
            return '<div class="bar-row"><span>' + escapeHtml(r.label) + '</span><span class="bar-track"><span class="bar-fill" style="display:block;width:' +
              Math.max(2, value / max * 100) + '%"></span></span><strong>' + value.toLocaleString("ko-KR") + '</strong></div>';
          }).join("") + '</div></section>';
      }).join("");
    });
  })();
  </script>
</body>
</html>
