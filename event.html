<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>행사 안내 — MR 40</title>
  <!-- Pretendard 폰트 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 공통 스타일 -->
  <link rel="stylesheet" href="assets/style.css" />
  <!-- 설정 & 공통 스크립트 -->
  <script src="config.js"></script>
  <script src="assets/common.js"></script>

  <style>
    /* ── 페이지 헤더 ── */
    .ev-header {
      padding: 3.5rem 0 2rem;
      text-align: center;
    }

    .ev-eyebrow {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--accent);
      margin-bottom: 0.8rem;
    }

    .ev-title {
      font-size: clamp(1.8rem, 6vw, 3rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1.25;
      margin-bottom: 1rem;
    }

    .ev-date-line {
      font-size: 1.05rem;
      color: var(--text);
      font-weight: 600;
    }

    .ev-place-line {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    /* ── D-day ── */
    .ev-dday {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      margin: 2rem 0;
    }

    .ev-dday .unit {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 0.8rem;
      padding: 0.8rem 0.6rem;
      min-width: 4.2rem;
      text-align: center;
    }

    .ev-dday .num {
      font-size: 1.5rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
    }

    .ev-dday .label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    .ev-thanks {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 700;
      margin: 2rem 0;
    }

    /* ── 신청 버튼 ── */
    .ev-cta {
      text-align: center;
      margin-bottom: 3rem;
    }

    .ev-apply-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 9999px;
      padding: 0.9rem 2.2rem;
      font-size: 1.05rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(91, 140, 255, 0.35);
      transition: opacity 0.2s, transform 0.2s;
    }

    .ev-apply-btn:hover {
      opacity: 0.9;
      transform: scale(1.04);
    }

    .ev-cta .cta-note {
      display: block;
      margin-top: 0.6rem;
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ── 정보 카드 ── */
    .ev-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      padding-bottom: 2rem;
    }

    @media (min-width: 768px) {
      .ev-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .ev-card h3 {
      font-size: 0.95rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      color: var(--accent);
    }

    .ev-card p, .ev-card li {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .ev-card ul {
      list-style: none;
    }

    .ev-card li::before {
      content: "·";
      color: var(--accent);
      font-weight: 900;
      margin-right: 0.45rem;
    }

    /* ── 프로그램 표 ── */
    .ev-program {
      padding-bottom: 4rem;
    }

    .ev-program h2 {
      font-size: 1.3rem;
      font-weight: 900;
      margin-bottom: 1rem;
      text-align: center;
    }

    .program-row {
      display: flex;
      gap: 1rem;
      align-items: baseline;
      padding: 0.85rem 1.1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .program-row .time {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      min-width: 5.5rem;
    }

    .program-row .what {
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .program-row .what small {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .ev-tbd {
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      padding: 1rem;
    }

    /* ── 사이트 푸터 ── */
    .site-footer {
      border-top: 1px solid rgba(91, 140, 255, 0.12);
      padding: 2rem 1.25rem;
      text-align: center;
    }

    .site-footer .footer-name {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.02em;
      margin-bottom: 0.4rem;
    }

    .site-footer .footer-note {
      font-size: 0.75rem;
      color: rgba(125, 141, 181, 0.55);
    }
  </style>
</head>
<body>
  <script>injectNav("event.html");</script>

  <header class="ev-header container">
    <p class="ev-eyebrow">MR 40TH ANNIVERSARY</p>
    <h1 class="ev-title">창립 40주년 기념행사</h1>
    <p class="ev-date-line" id="ev-date">2026년 11월 28일 (토)</p>
    <p class="ev-place-line" id="ev-place"></p>
  </header>

  <div class="container">
    <div class="ev-dday" id="ev-dday"></div>

    <div class="ev-cta">
      <button class="ev-apply-btn" id="apply-btn" type="button">참가 신청하기 🎉</button>
      <span class="cta-note">동문·현역 누구나 환영합니다</span>
    </div>

    <div class="ev-grid" id="ev-info"></div>

    <section class="ev-program">
      <h2>프로그램</h2>
      <div id="program-list"></div>
    </section>
  </div>

  <footer class="site-footer">
    <p class="footer-name">KAIST 마이크로 로봇 동아리 MR · Since 1986</p>
    <p class="footer-note">© 2026 MR 40주년 준비위원회</p>
  </footer>

  <script>
  (function () {
    "use strict";

    // ─────────────────────────────────────────────
    // 행사 정보 (확정되면 이 상수만 수정하면 됩니다)
    // 시간·장소가 미정인 항목은 비워두면 "추후 공지"로 표시됩니다.
    // ─────────────────────────────────────────────
    var EVENT_INFO = [
      { title: "📍 장소", lines: [] },               // 비어 있으면 추후 공지
      { title: "👥 대상", lines: ["MR 동문 (역대 전 기수)", "현역 부원", "지도교수 및 내빈"] },
      { title: "💰 참가비", lines: [] },              // 비어 있으면 추후 공지
    ];

    var PROGRAM = [
      // { time: "17:00", what: "등록 및 환영", note: "" },
      // 확정되면 위 형식으로 추가하세요.
    ];

    // ── 날짜·장소 표기 (config.js 연동) ──
    var target = new Date(CONFIG.EVENT_DATE);
    var WEEKDAYS = ["일", "월", "화", "수", "목", "금", "토"];
    document.getElementById("ev-date").textContent =
      target.getFullYear() + "년 " + (target.getMonth() + 1) + "월 " + target.getDate() + "일 (" +
      WEEKDAYS[target.getDay()] + ")";
    document.getElementById("ev-place").textContent =
      CONFIG.EVENT_PLACE && CONFIG.EVENT_PLACE !== "미정" ? CONFIG.EVENT_PLACE : "장소 추후 공지";

    // ── D-day ──
    var ddayEl = document.getElementById("ev-dday");

    function pad(n) { return String(n).padStart(2, "0"); }

    function tick() {
      var diff = target.getTime() - Date.now();
      if (diff <= 0) {
        ddayEl.outerHTML = '<p class="ev-thanks">함께해 주셔서 감사합니다 ❤️</p>';
        clearInterval(timer);
        return;
      }
      var d = Math.floor(diff / 86400000);
      var h = Math.floor(diff % 86400000 / 3600000);
      var m = Math.floor(diff % 3600000 / 60000);
      var s = Math.floor(diff % 60000 / 1000);
      ddayEl.innerHTML =
        '<div class="unit"><div class="num">' + d + '</div><div class="label">일</div></div>' +
        '<div class="unit"><div class="num">' + pad(h) + '</div><div class="label">시간</div></div>' +
        '<div class="unit"><div class="num">' + pad(m) + '</div><div class="label">분</div></div>' +
        '<div class="unit"><div class="num">' + pad(s) + '</div><div class="label">초</div></div>';
    }

    var timer = setInterval(tick, 1000);
    tick();

    // ── 참가 신청 (SURVEYS의 참석 조사 우선, 없으면 EVENT_FORM_URL) ──
    document.getElementById("apply-btn").addEventListener("click", function () {
      var attend = (CONFIG.SURVEYS || []).find(function (s) { return s.id === "attend" && s.active; });
      var url = (attend && attend.url) || CONFIG.EVENT_FORM_URL;
      if (!url) {
        showToast("참석 조사가 곧 열립니다. 조금만 기다려 주세요!");
        return;
      }
      window.open(url, "_blank", "noopener,noreferrer");
    });

    // ── 정보 카드 ──
    var infoEl = document.getElementById("ev-info");
    var infoHtml = "";
    EVENT_INFO.forEach(function (card) {
      var body = card.lines.length
        ? "<ul>" + card.lines.map(function (l) { return "<li>" + escapeHtml(l) + "</li>"; }).join("") + "</ul>"
        : "<p>추후 공지</p>";
      infoHtml += '<div class="ev-card card"><h3>' + escapeHtml(card.title) + "</h3>" + body + "</div>";
    });
    infoEl.innerHTML = infoHtml;

    // ── 프로그램 ──
    var progEl = document.getElementById("program-list");
    if (PROGRAM.length === 0) {
      progEl.innerHTML = '<p class="ev-tbd">세부 프로그램은 확정되는 대로 공지됩니다. 🗓️</p>';
    } else {
      progEl.innerHTML = PROGRAM.map(function (p) {
        return '<div class="program-row"><span class="time">' + escapeHtml(p.time) + "</span>" +
          '<span class="what">' + escapeHtml(p.what) +
          (p.note ? "<small>" + escapeHtml(p.note) + "</small>" : "") +
          "</span></div>";
      }).join("");
    }
  })();
  </script>
</body>
</html>
